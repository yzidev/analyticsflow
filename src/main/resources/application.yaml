spring:
  application:
    name: AnalyticsFlow
  datasource:
    url: jdbc:postgresql://localhost:5432/analyticsflow?currentSchema=analyticsflow_support,analyticsflow_staging,analyticsflow_oltp,analyticsflow_olap,public&reWriteBatchedInserts=true
    username: analyticsflow
    password: analyticsflow
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/analyticsflow
    username: analyticsflow
    password: analyticsflow
  data:
    r2dbc:
      repositories:
        enabled: false
  flyway:
    enabled: true
    default-schema: public
    schemas: public
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
      table-prefix: analyticsflow_support.BATCH_

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

analyticsflow:
  data:
    source-directory: data/files
    sample-directory: data/sample
    reports-directory: data/reports
  batch:
    default-chunk-size: 5000
  db:
    blocking:
      url: jdbc:postgresql://localhost:5432/analyticsflow?currentSchema=analyticsflow_support,analyticsflow_staging,analyticsflow_oltp,analyticsflow_olap,public&reWriteBatchedInserts=true
      username: analyticsflow
      password: analyticsflow
    reactive:
      url: r2dbc:postgresql://localhost:5432/analyticsflow
      username: analyticsflow
      password: analyticsflow
